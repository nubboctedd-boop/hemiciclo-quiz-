<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: ¿Quién es este Congresista?</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VWZ5Y1JWMT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // Leer la URL para enviar el título correcto a Analytics inmediatamente
      const params = new URLSearchParams(window.location.search);
      const ch = params.get('chamber');
      const p = params.get('party');
      const mode = params.get('mode');
      
      let pageTitle = 'Evaluación General';
      if (mode === 'revancha') {
          pageTitle = 'Modo Revancha';
      } else {
          if (ch === 'senado') pageTitle = 'Módulo: Senadores';
          if (ch === 'diputados') pageTitle = 'Módulo: Diputados';
          
          if (p) {
              pageTitle += ' (' + p + ')';
          }
      }

      gtag('config', 'G-VWZ5Y1JWMT', {
          'page_title': pageTitle
      });
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 550px;
            width: 100%;
            text-align: center;
            border-top: 6px solid #003366;
        }
        h1 {
            color: #003366;
            margin-top: 0;
            font-size: 1.8em;
            font-weight: 600;
        }
        .score {
            font-size: 16px;
            margin-bottom: 25px;
            color: #555555;
            font-weight: 500;
        }
        .photo-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
            background-color: #f9f9f9;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background-color: #ffffff;
            color: #333333;
            border: 1px solid #ccc;
            padding: 14px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            padding-left: 20px;
        }
        .option-btn:hover {
            background-color: #f0f4f8;
            border-color: #003366;
        }
        .option-btn.correct {
            background-color: #e8f5e9;
            border-color: #4CAF50;
            color: #2e7d32;
        }
        .option-btn.wrong {
            background-color: #ffebee;
            border-color: #f44336;
            color: #c62828;
        }
        #next-btn {
            margin-top: 25px;
            background-color: #003366;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            display: none;
            font-weight: 500;
            width: 100%;
        }
        #next-btn:hover {
            background-color: #002244;
        }
        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #003366;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
        }
        #back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<a href="index.html" id="back-btn">← Volver al Panel</a>

<div class="quiz-container">
    <h1>Identificación de Candidato</h1>
    <div class="score">Aciertos: <span id="score-val">0</span> / <span id="total-val">0</span> intentos</div>
    
    <div class="photo-container">
        <img id="candidate-photo" src="" alt="Registro Fotográfico">
    </div>
    
    <div class="options-container" id="options">
        <!-- Los botones se generarán dinámicamente -->
    </div>
    
    <button id="next-btn" onclick="loadNextQuestion()">Siguiente Registro</button>
</div>

<script>
    let candidatos = [];
    let currentCandidate = null;
    let score = 0;
    let total = 0;

    const urlParams = new URLSearchParams(window.location.search);
    const chamberParam = urlParams.get('chamber');
    const partyParam = urlParams.get('party');
    const modeParam = urlParams.get('mode');

    // Cargar datos
    fetch('candidatos.json?v=' + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            let filtered = data;
            
            if (modeParam === 'revancha') {
                const errores = JSON.parse(localStorage.getItem('hemiciclo_errores') || '[]');
                filtered = data.filter(c => errores.includes(c.dni));
                
                document.querySelector('h1').textContent = `Modo Revancha`;
                document.title = `Modo Revancha`;
                
                if (filtered.length === 0) {
                    document.querySelector('.options-container').innerHTML = '<p>¡Felicidades! Ya repasaste todos tus errores. <a href="index.html">Volver al menú</a></p>';
                    return;
                }
            } else {
                // Filtro por cámara
                if (chamberParam === 'senado' || chamberParam === 'diputados') {
                    filtered = filtered.filter(c => c.chamber === chamberParam);
                    const isSenado = chamberParam === 'senado';
                    const title = isSenado ? 'Senador' : 'Diputado';
                    document.querySelector('h1').textContent = `Identificación de ${title}`;
                } else {
                    document.querySelector('h1').textContent = `Identificación de Candidato`;
                }
                
                // Filtro por partido
                if (partyParam) {
                    filtered = filtered.filter(c => c.partyName === partyParam);
                }
            }
            
            candidatos = filtered;
            loadNextQuestion();
        })
        .catch(err => {
            document.querySelector('.quiz-container').innerHTML = '<p style="color:red;">Error cargando datos. Recuerda usar un servidor local.</p>';
            console.error(err);
        });

    function loadNextQuestion() {
        if(candidatos.length === 0) {
            document.querySelector('.options-container').innerHTML = '<p>No hay suficientes candidatos en esta selección.</p>';
            return;
        }

        // Elegir al candidato correcto aleatoriamente
        currentCandidate = candidatos[Math.floor(Math.random() * candidatos.length)];
        
        // Filtrar otros candidatos del MISMO GÉNERO
        let sameGenderCandidates = candidatos.filter(c => c.gender === currentCandidate.gender && c.dni !== currentCandidate.dni);
        
        // Mezclar y tomar 3
        sameGenderCandidates = sameGenderCandidates.sort(() => 0.5 - Math.random());
        let roundOptions = [currentCandidate, ...sameGenderCandidates.slice(0, 3)];
        
        // Si no hay suficientes del mismo género, rellenar con cualquiera (por seguridad)
        if (roundOptions.length < 4) {
            let others = candidatos.filter(c => !roundOptions.includes(c));
            others = others.sort(() => 0.5 - Math.random());
            roundOptions = [...roundOptions, ...others.slice(0, 4 - roundOptions.length)];
        }
        
        // Mezclar las 4 opciones finales
        roundOptions = roundOptions.sort(() => 0.5 - Math.random());

        // Actualizar UI
        document.getElementById('candidate-photo').src = currentCandidate.localPhotoPath;
        document.getElementById('next-btn').style.display = 'none';
        
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        roundOptions.forEach(cand => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            
            let regionStr = cand.districtName === 'Distrito Nacional Único' ? 'Nacional' : cand.districtName;
            
            btn.innerHTML = `<strong>${cand.name}</strong><br><span style="font-size:0.85em; color:#777">${cand.partyName || cand.partyCode} &nbsp;•&nbsp; ${regionStr}</span>`;
            btn.onclick = () => checkAnswer(btn, cand);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, selectedCandidate) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        total++;
        document.getElementById('total-val').textContent = total;
        
        let errores = JSON.parse(localStorage.getItem('hemiciclo_errores') || '[]');

        if (selectedCandidate.dni === currentCandidate.dni) {
            selectedBtn.classList.add('correct');
            score++;
            document.getElementById('score-val').textContent = score;
            
            // Si contesta bien, quitar de errores
            errores = errores.filter(dni => dni !== currentCandidate.dni);
            localStorage.setItem('hemiciclo_errores', JSON.stringify(errores));
            
        } else {
            selectedBtn.classList.add('wrong');
            buttons.forEach(btn => {
                if (btn.innerHTML.includes(currentCandidate.name)) {
                    btn.classList.add('correct');
                }
            });
            
            // Si contesta mal, añadir a errores
            if (!errores.includes(currentCandidate.dni)) {
                errores.push(currentCandidate.dni);
                localStorage.setItem('hemiciclo_errores', JSON.stringify(errores));
            }
        }

        // Si estamos en revancha y ya no hay errores, mostrar mensaje en vez de botón "Siguiente"
        if (modeParam === 'revancha' && errores.length === 0) {
            const nextBtn = document.getElementById('next-btn');
            nextBtn.textContent = '¡Terminaste! Volver al menú';
            nextBtn.onclick = () => window.location.href = 'index.html';
            nextBtn.style.display = 'inline-block';
            nextBtn.style.backgroundColor = '#4CAF50';
        } else {
            document.getElementById('next-btn').style.display = 'inline-block';
        }
    }
</script>

</body>
</html>
