<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: ¿Quién es este Congresista?</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VWZ5Y1JWMT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-VWZ5Y1JWMT');
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 550px;
            width: 100%;
            text-align: center;
            border-top: 6px solid #003366;
        }
        h1 {
            color: #003366;
            margin-top: 0;
            font-size: 1.8em;
            font-weight: 600;
        }
        .score {
            font-size: 16px;
            margin-bottom: 25px;
            color: #555555;
            font-weight: 500;
        }
        .photo-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
            background-color: #f9f9f9;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background-color: #ffffff;
            color: #333333;
            border: 1px solid #ccc;
            padding: 14px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            padding-left: 20px;
        }
        .option-btn:hover {
            background-color: #f0f4f8;
            border-color: #003366;
        }
        .option-btn.correct {
            background-color: #e8f5e9;
            border-color: #4CAF50;
            color: #2e7d32;
        }
        .option-btn.wrong {
            background-color: #ffebee;
            border-color: #f44336;
            color: #c62828;
        }
        #next-btn {
            margin-top: 25px;
            background-color: #003366;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            display: none;
            font-weight: 500;
            width: 100%;
        }
        #next-btn:hover {
            background-color: #002244;
        }
        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #003366;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
        }
        #back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<a href="index.html" id="back-btn">← Volver al Panel</a>

<div class="quiz-container">
    <h1>Identificación de Candidato</h1>
    <div class="score">Aciertos: <span id="score-val">0</span> / <span id="total-val">0</span> intentos</div>
    
    <div class="photo-container">
        <img id="candidate-photo" src="" alt="Registro Fotográfico">
    </div>
    
    <div class="options-container" id="options">
        <!-- Los botones se generarán dinámicamente -->
    </div>
    
    <button id="next-btn" onclick="loadNextQuestion()">Siguiente Registro</button>
</div>

<script>
    let candidatos = [];
    let currentCandidate = null;
    let score = 0;
    let total = 0;

    // Obtener parametro de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const chamberParam = urlParams.get('chamber');

    // Cargar datos
    fetch('candidatos.json?v=' + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            if (chamberParam === 'senado' || chamberParam === 'diputados') {
                candidatos = data.filter(c => c.chamber === chamberParam);
                const title = chamberParam === 'senado' ? 'Senador' : 'Diputado';
                document.querySelector('h1').textContent = `Identificación de ${title}`;
            } else {
                candidatos = data;
                document.querySelector('h1').textContent = `Identificación de Candidato`;
            }
            loadNextQuestion();
        })
        .catch(err => {
            document.querySelector('.quiz-container').innerHTML = '<p style="color:red;">Error cargando datos. Recuerda usar un servidor local.</p>';
            console.error(err);
        });

    function getRandomCandidates(count) {
        const shuffled = [...candidatos].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, count);
    }

    function loadNextQuestion() {
        if(candidatos.length === 0) return;

        // Seleccionar 4 candidatos aleatorios
        const roundCandidates = getRandomCandidates(4);
        
        // Elegir a uno como el correcto
        currentCandidate = roundCandidates[Math.floor(Math.random() * roundCandidates.length)];

        // Actualizar UI
        document.getElementById('candidate-photo').src = currentCandidate.localPhotoPath;
        document.getElementById('next-btn').style.display = 'none';
        
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        roundCandidates.forEach(cand => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            
            // Si el distrito es "Distrito Nacional Único" podemos acortarlo
            let regionStr = cand.districtName === 'Distrito Nacional Único' ? 'Nacional' : cand.districtName;
            
            btn.innerHTML = `<strong>${cand.name}</strong><br><span style="font-size:0.85em; color:#777">${cand.partyName || cand.partyCode} &nbsp;•&nbsp; ${regionStr}</span>`;
            btn.onclick = () => checkAnswer(btn, cand);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, selectedCandidate) {
        // Deshabilitar todos los botones temporalmente
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        total++;
        document.getElementById('total-val').textContent = total;

        if (selectedCandidate.dni === currentCandidate.dni) {
            selectedBtn.classList.add('correct');
            score++;
            document.getElementById('score-val').textContent = score;
        } else {
            selectedBtn.classList.add('wrong');
            // Resaltar el correcto
            buttons.forEach(btn => {
                if (btn.innerHTML.includes(currentCandidate.name)) {
                    btn.classList.add('correct');
                }
            });
        }

        document.getElementById('next-btn').style.display = 'inline-block';
    }
</script>

</body>
</html>
