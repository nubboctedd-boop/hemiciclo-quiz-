<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: ¿Quién es este Congresista?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #4CAF50;
            margin-top: 0;
        }
        .score {
            font-size: 18px;
            margin-bottom: 20px;
            color: #aaa;
        }
        .photo-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #333;
            background-color: #2a2a2a;
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .option-btn:hover {
            background-color: #4CAF50;
            transform: translateY(-2px);
        }
        .option-btn:active {
            transform: translateY(0);
        }
        .option-btn.correct {
            background-color: #4CAF50;
        }
        .option-btn.wrong {
            background-color: #f44336;
        }
        #next-btn {
            margin-top: 30px;
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }
        #next-btn:hover {
            background-color: #0b7dda;
        }
        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }
        #back-btn:hover {
            color: white;
        }
    </style>
</head>
<body>

<a href="index.html" id="back-btn">← Volver al menú</a>

<div class="quiz-container">
    <h1>¿Quién es este candidato?</h1>
    <div class="score">Puntuación: <span id="score-val">0</span> / <span id="total-val">0</span></div>
    
    <div class="photo-container">
        <img id="candidate-photo" src="" alt="Candidato">
    </div>
    
    <div class="options-container" id="options">
        <!-- Los botones se generarán dinámicamente -->
    </div>
    
    <button id="next-btn" onclick="loadNextQuestion()">Siguiente Candidato</button>
</div>

<script>
    let candidatos = [];
    let currentCandidate = null;
    let score = 0;
    let total = 0;

    // Obtener parametro de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const chamberParam = urlParams.get('chamber');

    // Cargar datos
    fetch('candidatos.json')
        .then(res => res.json())
        .then(data => {
            if (chamberParam === 'senado' || chamberParam === 'diputados') {
                candidatos = data.filter(c => c.chamber === chamberParam);
                const title = chamberParam === 'senado' ? 'Senador' : 'Diputado';
                document.querySelector('h1').textContent = `¿Quién es este ${title}?`;
            } else {
                candidatos = data;
                document.querySelector('h1').textContent = `¿Quién es este candidato?`;
            }
            loadNextQuestion();
        })
        .catch(err => {
            document.querySelector('.quiz-container').innerHTML = '<p style="color:red;">Error cargando datos. Recuerda usar un servidor local.</p>';
            console.error(err);
        });

    function getRandomCandidates(count) {
        const shuffled = [...candidatos].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, count);
    }

    function loadNextQuestion() {
        if(candidatos.length === 0) return;

        // Seleccionar 4 candidatos aleatorios
        const roundCandidates = getRandomCandidates(4);
        
        // Elegir a uno como el correcto
        currentCandidate = roundCandidates[Math.floor(Math.random() * roundCandidates.length)];

        // Actualizar UI
        document.getElementById('candidate-photo').src = currentCandidate.localPhotoPath;
        document.getElementById('next-btn').style.display = 'none';
        
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        roundCandidates.forEach(cand => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${cand.name}</strong><br><span style="font-size:0.8em; color:#bbb">${cand.partyName || cand.partyCode}</span>`;
            btn.onclick = () => checkAnswer(btn, cand);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, selectedCandidate) {
        // Deshabilitar todos los botones temporalmente
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        total++;
        document.getElementById('total-val').textContent = total;

        if (selectedCandidate.dni === currentCandidate.dni) {
            selectedBtn.classList.add('correct');
            score++;
            document.getElementById('score-val').textContent = score;
        } else {
            selectedBtn.classList.add('wrong');
            // Resaltar el correcto
            buttons.forEach(btn => {
                if (btn.innerHTML.includes(currentCandidate.name)) {
                    btn.classList.add('correct');
                }
            });
        }

        document.getElementById('next-btn').style.display = 'inline-block';
    }
</script>

</body>
</html>
