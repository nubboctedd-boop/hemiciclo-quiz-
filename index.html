<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Congreso 2026</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VWZ5Y1JWMT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-VWZ5Y1JWMT');
    </script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            grid-auto-rows: 80px;
            z-index: -2;
            overflow: hidden;
            opacity: 0.5;
        }
        .bg-grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 51, 102, 0.85); /* Azul institucional con transparencia */
            z-index: -1;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 6px solid #003366;
        }
        h1 {
            color: #003366;
            margin-top: 0;
            font-size: 2.2em;
            font-weight: 600;
        }
        p {
            font-size: 1.1em;
            color: #555555;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        a.btn {
            background-color: #ffffff;
            color: #003366;
            text-decoration: none;
            padding: 18px;
            border-radius: 6px;
            font-size: 1.3em;
            font-weight: 500;
            transition: all 0.2s;
            border: 2px solid #e0e0e0;
        }
        a.btn:hover {
            background-color: #f0f4f8;
            border-color: #003366;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 51, 102, 0.1);
        }
        a.btn:active {
            transform: translateY(0);
        }
        .senado {
            color: #d32f2f !important;
            font-weight: 600;
        }
        .diputados {
            color: #0056b3 !important;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }
        select {
            width: 100%;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1.1em;
            color: #333;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

<div class="bg-grid" id="bg-grid"></div>
<div class="overlay"></div>

<div class="container">
    <h1>Herramienta de Reconocimiento Parlamentario</h1>
    <p>Sistema de entrenamiento visual para el equipo. Seleccione la bancada y la cámara correspondiente para iniciar la sesión de identificación.</p>
    
    <div class="form-group">
        <label for="party-select" style="font-weight: 600; color: #003366; display: block; margin-bottom: 8px;">Filtrar por Bancada (Opcional):</label>
        <select id="party-select">
            <option value="todos">-- Todas las Bancadas --</option>
            <option value="Ahora Nación (AN)">Ahora Nación (AN)</option>
            <option value="Fuerza Popular (FP)">Fuerza Popular (FP)</option>
            <option value="Juntos por el Perú (JP)">Juntos por el Perú (JP)</option>
            <option value="Partido Cívico Obras (OBRAS)">Partido Cívico Obras (OBRAS)</option>
            <option value="Partido del Buen Gobierno (BG)">Partido del Buen Gobierno (BG)</option>
            <option value="Renovación Popular (RP)">Renovación Popular (RP)</option>
        </select>
    </div>

    <div class="menu-options">
        <a href="#" onclick="startQuiz('senado')" class="btn"><span class="senado">Módulo: Senado</span></a>
        <a href="#" onclick="startQuiz('diputados')" class="btn"><span class="diputados">Módulo: Diputados</span></a>
        <a href="#" onclick="startQuiz('todos')" class="btn" style="font-size: 1.1em; padding: 14px; color: #555;">Evaluación General</a>
        
        <!-- Botón de Modo Revancha (Aparece solo si hay errores) -->
        <a href="#" id="btn-revancha" onclick="startRevancha()" class="btn" style="display: none; background-color: #ff9800; color: white; border: none; font-size: 1.1em; padding: 14px; margin-top: 15px;">🔄 Módulo de Reforzamiento</a>
    </div>

    <div style="margin-top: 40px; padding-top: 20px; color: #b0b0b0; font-size: 0.8em; font-weight: 400; text-align: center;">
        Creado por Maythe Vásquez Caro
    </div>
</div>

<script>
    // Verificar si hay errores guardados al cargar la página
    document.addEventListener('DOMContentLoaded', () => {
        const errores = JSON.parse(localStorage.getItem('hemiciclo_errores') || '[]');
        if (errores.length > 0) {
            const btn = document.getElementById('btn-revancha');
            btn.style.display = 'block';
            btn.innerHTML = `🔄 Módulo de Reforzamiento (${errores.length} pendientes)`;
        }

        // Cargar mosaico de fondo
        fetch('candidatos.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('bg-grid');
                // Mezclamos al azar
                const shuffled = data.sort(() => 0.5 - Math.random());
                
                // Repetimos el arreglo para asegurar que llene pantallas de PC grandes
                let pool = [];
                while(pool.length < 500) {
                    pool = pool.concat(shuffled);
                }

                // Generamos 500 imágenes para cubrir cualquier resolución
                for(let i = 0; i < 500; i++) {
                    const img = document.createElement('img');
                    img.src = pool[i].localPhotoPath;
                    grid.appendChild(img);
                }
            })
            .catch(err => console.error("Error cargando mosaico:", err));
    });

    function startQuiz(chamber) {
        const party = document.getElementById('party-select').value;
        let url = `quiz.html?chamber=${chamber}`;
        if (party !== 'todos') {
            url += `&party=${encodeURIComponent(party)}`;
        }
        window.location.href = url;
    }

    function startRevancha() {
        window.location.href = `quiz.html?mode=revancha`;
    }
</script>

</body>
</html>
