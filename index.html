<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Congreso 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #4CAF50;
            margin-top: 0;
            font-size: 2.5em;
        }
        p {
            font-size: 1.2em;
            color: #aaa;
            margin-bottom: 40px;
        }
        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        a.btn {
            background-color: #333;
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.5em;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
            border: 2px solid transparent;
        }
        a.btn:hover {
            background-color: #2a2a2a;
            border-color: #4CAF50;
            transform: translateY(-4px);
        }
        a.btn:active {
            transform: translateY(0);
        }
        .senado {
            color: #ff9800 !important;
        }
        .diputados {
            color: #03a9f4 !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>¿A quién conoces?</h1>
    <p>Elige la cámara que quieres poner a prueba y adivina el candidato.</p>
    
    <div class="menu-options">
        <a href="quiz.html?chamber=senado" class="btn"><span class="senado">🏛️ Quiz de Senadores</span> (60)</a>
        <a href="quiz.html?chamber=diputados" class="btn"><span class="diputados">👥 Quiz de Diputados</span> (130)</a>
        <a href="quiz.html?chamber=todos" class="btn" style="font-size: 1.2em; padding: 15px;">Mezclar Todos (190)</a>
    </div>

    <div style="margin-top: 35px; color: #777; font-size: 0.95em; font-style: italic; letter-spacing: 0.5px;">
        Creado por Maythe Vásquez
    </div>
</div>

</body>
</html>
